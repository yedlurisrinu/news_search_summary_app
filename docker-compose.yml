# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  vault-network:
    external: true
  infra-network:
    external: true

# ── Services ──────────────────────────────────────────────────────────────────
services:
  # ── News Summary RAG App ─────────────────────────────────────────────────────
  news-summary-app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: news-search-summary-app
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - PYTHONPATH=src
      - VAULT_ADDR=http://vault-server:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
      - VAULT_SECRET_PATH=secret/NEWS_SUMMARY_APP
    networks:
      - vault-network
      - infra-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
